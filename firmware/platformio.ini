; LILYGO T-Display AMOLED PLUS (ESP32-S3, 1.91" RM67162 240x536)
; Claude 토큰 사용량 미터기 펌웨어 — Arduino_GFX 방식

[platformio]
boards_dir = boards

[env:T-Display-AMOLED]
platform = espressif32@6.12.0
board = T-Display-AMOLED
framework = arduino

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DDISABLE_ALL_LIBRARY_WARNINGS

monitor_speed = 115200
monitor_filters =
  default
  esp32_exception_decoder

upload_speed = 921600

; 패널 드라이버(1.91 Plus = RM67162 "SPI" 변종)는 lib/LilyGo_AMOLED 에 벤더링됨
; (LVGL/TFT_eSPI 등 예제 의존성 파일은 제거한 사본)
lib_deps =
  lewisxhe/XPowersLib @ 0.2.7
  lewisxhe/SensorLib @ 0.2.4
  ; 그리기용 캔버스(프레임버퍼). 1.4.x = Arduino core 2.0.x 호환.
  moononournation/GFX Library for Arduino @ 1.4.7
  bblanchon/ArduinoJson @ ^7.1.0

; WiFi/서버 주소는 src/config.h 에서 설정 (config.example.h 복사)
